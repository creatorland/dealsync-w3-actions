name: Dispatch Batches
description: Claim emails into transition stages and trigger processor workflows
inputs:
  auth-url:
    description: 'SxT auth proxy URL'
    required: true
  auth-secret:
    description: 'Shared secret for auth proxy'
    required: true
  sxt-api-url:
    description: 'SxT API base URL'
    required: true
  private-key:
    description: 'SxT private key for biscuit generation'
    required: true
  sxt-schema:
    description: 'SxT schema prefix'
    required: true
  w3-rpc-url:
    description: 'W3 node RPC URL'
    required: true
  active-filter:
    description: 'Current active filter count'
    required: true
  active-detect:
    description: 'Current active detection count'
    required: true
  pending-filter:
    description: 'Pending stage-2 count'
    required: true
  pending-detect:
    description: 'Pending stage-3 count'
    required: true
  max-filter:
    description: 'Max filter concurrency'
    required: true
  max-detect:
    description: 'Max detection concurrency'
    required: true
  filter-batch-size:
    description: 'Emails per filter batch'
    required: true
  detect-batch-size:
    description: 'Emails per detection batch'
    required: true
outputs:
  success:
    description: 'Whether dispatching succeeded'
  dispatched_filter_count:
    description: 'Number of filter batches dispatched'
  dispatched_detect_count:
    description: 'Number of detection batches dispatched'
runs:
  using: node24
  main: src/index.js
