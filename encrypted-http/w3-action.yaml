kind: integration
partner: creatorland
name: Encrypted HTTP
version: 2.0.0
repo: creatorland/dealsync-w3-actions

commands:
  - name: request
    description: Make an HTTP request with optional AES-256-GCM encryption and retry
    inputs:
      url:
        type: string
        required: true
        description: Target URL
      method:
        type: string
        description: HTTP method (GET, POST, PUT, DELETE)
      headers:
        type: string
        description: JSON string of headers
      body:
        type: string
        description: Request body
    outputs:
      success:
        type: string
        description: Whether request succeeded (true/false)
      status-code:
        type: string
        description: HTTP status code
      response:
        type: string
        description: Response body (optionally encrypted)
