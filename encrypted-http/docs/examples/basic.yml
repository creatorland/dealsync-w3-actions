# Basic encrypted-http usage examples

# Simple GET request
- name: Simple GET
  uses: creatorland/dealsync-w3-actions/encrypted-http@main
  with:
    url: https://api.example.com/data
    method: GET

# POST with encryption
- name: POST with encrypted response
  uses: creatorland/dealsync-w3-actions/encrypted-http@main
  with:
    url: https://api.example.com/data
    method: POST
    headers: '{"Content-Type":"application/json"}'
    body: '{"key":"value"}'
    encrypt: 'true'
    encrypt-outputs: "response"
    encryption-key: ${{ secrets.ENCRYPTION_KEY }}

# SxT query with extract-outputs
- name: SxT query
  uses: creatorland/dealsync-w3-actions/encrypted-http@main
  with:
    url: ${{ secrets.SXT_API_URL }}/v1/sql
    method: POST
    headers: '{"Authorization":"Bearer ${{ secrets.TOKEN }}","Content-Type":"application/json"}'
    body: '{"sqlText":"SELECT COUNT(*) AS CNT FROM schema.TABLE","biscuits":["${{ secrets.BISCUIT }}"]}'
    extract-outputs: "CNT"
