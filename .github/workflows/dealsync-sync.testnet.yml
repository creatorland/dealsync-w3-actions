name: dealsync-sync-testnet
authority: '0x553b60381dC74493d03b2865C818350f3347Ac7f'
on:
  workflow_dispatch:

concurrency:
  group: compact-sync-testnet
  cancel-in-progress: false

jobs:
  sync:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: '0xead32ddc4a0d3f3845531916e59a52cdd21c97a41b7ad2806a0cefac57b402bb'
    steps:
      - id: sync
        name: Sync deal states from email metadata
        timeout-minutes: 60
        uses: creatorland/dealsync-action@main
        with:
          command: sync-deal-states
          sxt-auth-url: ${{ secrets.SXT_AUTH_URL }}
          sxt-auth-secret: ${{ secrets.SXT_AUTH_SECRET }}
          sxt-api-url: ${{ secrets.SXT_API_URL }}
          sxt-biscuit: ${{ secrets.SXT_BISCUIT }}
          sxt-schema: ${{ secrets.SXT_SCHEMA }}
          sxt-rate-limiter-url: ${{ secrets.SXT_RATE_LIMITER_URL }}
          sxt-rate-limiter-api-key: ${{ secrets.SXT_RATE_LIMITER_API_KEY }}
          email-core-schema: ${{ secrets.EMAIL_CORE_SCHEMA }}
