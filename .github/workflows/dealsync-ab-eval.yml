# A/B Eval Workflow — compare two prompt/model variants against ground truth
#
# Available models (Hyperbolic API):
#   Qwen/Qwen3-Coder-480B-A35B-Instruct   (coder, newest)
#   deepseek-ai/DeepSeek-R1-0528           (reasoning, newest)
#   deepseek/deepseek-chat-v3-0324           (default, current production)
#   deepseek-ai/DeepSeek-R1                (reasoning)
#   meta-llama/Llama-3.3-70B-Instruct      (smallest)
#
# Prompt hashes:
#   4274af0  Rust baseline prompt (production v1)
#   57e99ad  v2 prompt with prefix caching + examples
#
# NOTE: W3 does not currently resolve ${{ inputs.X }} expressions.
# To change variants, edit the default values below and redeploy.

name: dealsync-ab-eval-7cf87b8
on:
  workflow_dispatch:
    inputs:
      hash_a:
        type: string
        description: Prompt commit hash for variant A (baseline)
        default: '4274af0'
      hash_b:
        type: string
        description: Prompt commit hash for variant B (candidate)
        default: '57e99ad'
      model_a:
        type: string
        description: Model for variant A
        default: 'deepseek/deepseek-chat-v3-0324'
      model_b:
        type: string
        description: Model for variant B
        default: 'deepseek/deepseek-chat-v3-0324'
      runs:
        type: string
        description: Number of eval runs per variant
        default: '1'
      temperature:
        type: string
        description: AI temperature
        default: '0'
      batch_size:
        type: string
        description: Threads per AI call
        default: '1'

jobs:
  eval-a:
    runs-on: ubuntu-latest
    environment: '0x248d3b31f1ffc78c4dcd0993da48b6568fe1f58cfac9f61554804f505dafd140'
    outputs:
      result: ${{ steps.run-eval.outputs.result }}
    steps:
      - id: run-eval
        name: Evaluate variant A
        uses: creatorland/dealsync-action@7cf87b8
        with:
          command: eval
          ai-api-key: ${{ secrets.AI_API_KEY }}
          ai-api-url: ${{ secrets.AI_API_URL }}
          ai-primary-model: ${{ inputs.model_a || 'deepseek/deepseek-chat-v3-0324' }}
          prompt-hash: ${{ inputs.hash_a || '4274af0' }}
          runs: ${{ inputs.runs || '1' }}
          temperature: ${{ inputs.temperature || '0' }}
          batch-size: ${{ inputs.batch_size || '1' }}

  eval-b:
    runs-on: ubuntu-latest
    environment: '0x248d3b31f1ffc78c4dcd0993da48b6568fe1f58cfac9f61554804f505dafd140'
    outputs:
      result: ${{ steps.run-eval.outputs.result }}
    steps:
      - id: run-eval
        name: Evaluate variant B
        uses: creatorland/dealsync-action@7cf87b8
        with:
          command: eval
          ai-api-key: ${{ secrets.AI_API_KEY }}
          ai-api-url: ${{ secrets.AI_API_URL }}
          ai-primary-model: ${{ inputs.model_b || 'deepseek/deepseek-chat-v3-0324' }}
          prompt-hash: ${{ inputs.hash_b || '57e99ad' }}
          runs: ${{ inputs.runs || '1' }}
          temperature: ${{ inputs.temperature || '0' }}
          batch-size: ${{ inputs.batch_size || '1' }}

  compare:
    needs: [eval-a, eval-b]
    runs-on: ubuntu-latest
    environment: '0x248d3b31f1ffc78c4dcd0993da48b6568fe1f58cfac9f61554804f505dafd140'
    steps:
      - id: compare
        name: Compare A vs B
        uses: creatorland/dealsync-action@7cf87b8
        with:
          command: eval-compare
          result-a: ${{ needs.eval-a.outputs.result }}
          result-b: ${{ needs.eval-b.outputs.result }}
