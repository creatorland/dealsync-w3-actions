name: dealsync-classify-testnet
authority: '0x553b60381dC74493d03b2865C818350f3347Ac7f'
on:
  workflow_dispatch:

concurrency:
  group: compact-classify-testnet
  cancel-in-progress: false

jobs:
  classify:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    environment: '0xead32ddc4a0d3f3845531916e59a52cdd21c97a41b7ad2806a0cefac57b402bb'
    steps:
      - id: classify
        name: Run classify pipeline
        timeout-minutes: 60
        uses: creatorland/dealsync-action@main
        with:
          command: run-classify-pipeline
          sxt-auth-url: ${{ secrets.SXT_AUTH_URL }}
          sxt-auth-secret: ${{ secrets.SXT_AUTH_SECRET }}
          sxt-api-url: ${{ secrets.SXT_API_URL }}
          sxt-biscuit: ${{ secrets.SXT_BISCUIT }}
          sxt-schema: ${{ secrets.SXT_SCHEMA }}
          sxt-rate-limiter-url: ${{ secrets.SXT_RATE_LIMITER_URL }}
          sxt-rate-limiter-api-key: ${{ secrets.SXT_RATE_LIMITER_API_KEY }}
          email-provider: ${{ secrets.EMAIL_PROVIDER }}
          email-core-schema: ${{ secrets.EMAIL_CORE_SCHEMA }}
          email-content-fetcher-url: ${{ secrets.EMAIL_CONTENT_FETCHER_URL }}
          email-service-url: ${{ secrets.EMAIL_SERVICE_URL }}
          ai-api-key: ${{ secrets.AI_API_KEY }}
          ai-primary-model: ${{ secrets.AI_PRIMARY_MODEL }}
          ai-fallback-model: ${{ secrets.AI_FALLBACK_MODEL }}
          ai-api-url: ${{ secrets.AI_API_URL }}
          pipeline-max-concurrent: ${{ secrets.PIPELINE_MAX_CONCURRENT }}
          pipeline-claim-size: ${{ secrets.PIPELINE_CLAIM_SIZE }}
          pipeline-classify-batch-size: ${{ secrets.PIPELINE_CLASSIFY_BATCH_SIZE }}
          pipeline-max-retries: ${{ secrets.PIPELINE_MAX_RETRIES }}
          pipeline-fetch-chunk-size: ${{ secrets.PIPELINE_FETCH_CHUNK_SIZE }}
          pipeline-fetch-timeout-ms: ${{ secrets.PIPELINE_FETCH_TIMEOUT_MS }}
          pipeline-flush-interval-ms: ${{ secrets.PIPELINE_FLUSH_INTERVAL_MS }}
          pipeline-flush-threshold: ${{ secrets.PIPELINE_FLUSH_THRESHOLD }}
          db-max-retries: ${{ secrets.DB_MAX_RETRIES }}
          ai-max-retries: ${{ secrets.AI_MAX_RETRIES }}
          email-max-retries: ${{ secrets.EMAIL_MAX_RETRIES }}
