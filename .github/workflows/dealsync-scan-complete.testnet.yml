name: ds-scan-complete-10m-testnet
authority: '0x553b60381dC74493d03b2865C818350f3347Ac7f'
on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

concurrency:
  group: scan-complete-testnet
  cancel-in-progress: false

jobs:
  scan-complete:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    environment: '0xead32ddc4a0d3f3845531916e59a52cdd21c97a41b7ad2806a0cefac57b402bb'
    steps:
      - id: emit
        name: Emit scan_complete webhooks
        timeout-minutes: 30
        uses: creatorland/dealsync-action@17f78b5b3da4000d6ef38b8e3fa95a704a17489d
        with:
          command: emit-scan-complete-webhooks
          sxt-auth-url: ${{ secrets.SXT_AUTH_URL }}
          sxt-auth-secret: ${{ secrets.SXT_AUTH_SECRET }}
          sxt-api-url: ${{ secrets.SXT_API_URL }}
          sxt-biscuit: ${{ secrets.SXT_BISCUIT }}
          sxt-schema: ${{ secrets.SXT_SCHEMA }}
          email-core-schema: EMAIL_CORE_STAGING
          # NOTE: this should include /api (backend has global prefix 'api'), e.g. https://<host>/api
          dealsync-backend-base-url: ${{ secrets.DEALSYNC_BACKEND_BASE_URL }}
          dealsync-v2-shared-secret: ${{ secrets.DEALSYNC_V2_SHARED_SECRET }}
          firestore-service-account-json: ${{ secrets.FIRESTORE_SERVICE_ACCOUNT_JSON }}
