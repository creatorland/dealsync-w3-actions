kind: integration
partner: creatorland
name: Dealsync
version: 2.0.0
repo: creatorland/dealsync-w3-actions

commands:
  - name: filter
    description: Apply static filter rules to email content (DKIM/SPF, blocked domains, automated subjects, etc.)
    inputs:
      emails:
        type: string
        required: true
        description: JSON array of email content objects
    outputs:
      result:
        type: object
        description: '{ filtered_ids, rejected_ids }'

  - name: build-prompt
    description: Build AI classification prompt from email content with incremental thread context
    inputs:
      emails:
        type: string
        required: true
        description: JSON array of email content objects
    outputs:
      result:
        type: object
        description: '{ system_prompt, user_prompt }'

  - name: classify
    description: Parse AI classification response, save evaluations/deals/contacts to SxT, update deal stages
    inputs:
      ai-response:
        type: string
        required: true
        description: AI classification JSON response
      metadata:
        type: string
        required: true
        description: JSON deal_states metadata for thread/email mapping
    outputs:
      result:
        type: object
        description: '{ deals_created, emails_classified, deal_ids, rejected_ids, non_english_ids }'

  - name: dispatch
    description: Claim email batches into transition stages and trigger processor workflows
    inputs:
      active-filter:
        type: string
        required: true
      pending-filter:
        type: string
        required: true
    outputs:
      result:
        type: object
        description: '{ dispatched_filter_count, dispatched_detect_count }'
