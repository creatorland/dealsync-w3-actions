name: 'Dealsync'
description: 'Email filtering, deal classification, and batch dispatch for the Dealsync pipeline'
author: 'creatorland'

inputs:
  command:
    description: 'Operation: filter, build-prompt, classify, dispatch'
    required: true
  encrypt:
    description: 'Enable encryption on sensitive outputs (true/false)'
    default: 'true'
  encryption-key:
    description: 'AES-256-GCM key'
  auth-url:
    description: 'SxT auth proxy URL (classify, dispatch)'
  auth-secret:
    description: 'SxT auth shared secret (classify, dispatch)'
  api-url:
    description: 'SxT API base URL (classify, dispatch)'
  biscuit:
    description: 'Pre-generated SxT biscuit (classify, dispatch)'
  schema:
    description: 'SxT schema name (classify, dispatch)'
  w3-rpc-url:
    description: 'W3 node URL for triggering processors (dispatch)'
  processor-name:
    description: 'Processor workflow name to trigger (dispatch)'
    default: 'Dealsync Processor'
  max-filter:
    description: 'Max emails in filtering status at once (dispatch)'
    default: '30000'
  max-classify:
    description: 'Max emails in classifying status at once (dispatch)'
    default: '750'
  filter-batch-size:
    description: 'Emails per filter batch (dispatch)'
    default: '200'
  classify-batch-size:
    description: 'Emails per classify batch (dispatch)'
    default: '5'
  emails:
    description: 'JSON array of email content (filter, build-prompt)'
  ai-response:
    description: 'AI classification JSON (classify)'
  metadata:
    description: 'JSON deal_states metadata (classify, extract-metadata, fetch-content)'
  content-fetcher-url:
    description: 'Content fetcher service URL (fetch-content)'
  fields:
    description: 'Comma-separated fields to keep from fetched content (fetch-content). Strips body/attachments when set.'
  sql:
    description: 'SQL statement (sxt-query, sxt-execute)'
  sxt-command:
    description: 'SxT operation type: query or execute (sxt-query, sxt-execute)'
  batch-id:
    description: 'Batch ID for workflow-triggers command'
  trigger-action:
    description: 'Action for workflow-triggers: start or complete'
  trigger-type:
    description: 'Type for workflow-triggers: filter or classify'
  hyperbolic-key:
    description: 'Hyperbolic API key for AI classification (fetch-and-classify)'
  primary-model:
    description: 'Primary AI model ID (fetch-and-classify)'
    default: 'deepseek-ai/DeepSeek-V3'
  fallback-model:
    description: 'Fallback AI model ID (fetch-and-classify)'
    default: 'Qwen/Qwen2.5-72B-Instruct'
  ai-api-url:
    description: 'AI API URL (fetch-and-classify)'
    default: 'https://api.hyperbolic.xyz/v1/chat/completions'
  sync-workflow-name:
    description: 'Deal state sync workflow name to trigger (dispatch-deal-state-sync)'
  deal-state-batch-size:
    description: 'Emails per deal state creation batch (dispatch-deal-state-sync)'
    default: '500'
  deal-state-max-emails:
    description: 'Max emails to process per cycle (dispatch-deal-state-sync)'
    default: '5000'
  offset:
    description: 'Offset for paginated queries (create-deal-states)'
    default: '0'
  limit:
    description: 'Limit for paginated queries (create-deal-states)'
    default: '500'

outputs:
  success:
    description: 'Whether operation succeeded'
  result:
    description: 'JSON result of the operation'

runs:
  using: 'node24'
  main: 'dist/index.js'
