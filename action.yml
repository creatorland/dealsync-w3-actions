name: 'Dealsync'
description: 'Dealsync pipeline action — run-filter-pipeline, run-classify-pipeline, sync-deal-states, eval, eval-compare'
author: 'creatorland'

inputs:
  command:
    description: 'Operation: run-filter-pipeline, run-classify-pipeline, sync-deal-states, eval, eval-compare'
    required: true
  sxt-auth-url:
    description: 'SxT auth proxy URL'
  sxt-auth-secret:
    description: 'SxT auth shared secret'
  sxt-api-url:
    description: 'SxT API base URL'
  sxt-biscuit:
    description: 'Pre-generated SxT biscuit'
  sxt-schema:
    description: 'SxT schema name (dealsync)'
  email-core-schema:
    description: 'SxT schema name (email core)'
  sxt-rate-limiter-url:
    description: 'SxT rate limiter service URL (optional, fail-open if not set)'
  sxt-rate-limiter-api-key:
    description: 'SxT API key for rate limiter token acquisition'
  email-content-fetcher-url:
    description: 'Content fetcher service URL (run-filter-pipeline, run-classify-pipeline)'
  email-provider:
    description: 'Email data provider: content-fetcher or email-service'
  email-service-url:
    description: 'Email service URL (only used when email-provider=email-service)'
  batch-id:
    description: 'Batch ID for processor commands (run-filter-pipeline, run-classify-pipeline)'
  ai-api-key:
    description: 'AI API key for classification (run-classify-pipeline)'
  ai-primary-model:
    description: 'Primary AI model ID (run-classify-pipeline)'
  ai-fallback-model:
    description: 'Fallback AI model ID (run-classify-pipeline)'
  ai-api-url:
    description: 'AI API URL (run-classify-pipeline)'
  pipeline-fetch-chunk-size:
    description: 'Emails per content-fetcher HTTP request (run-filter-pipeline, run-classify-pipeline)'
    default: '10'
  pipeline-fetch-timeout-ms:
    description: 'Content fetcher request timeout in ms'
    default: '120000'
  offset:
    description: 'Offset for paginated queries (sync-deal-states)'
    default: '0'
  limit:
    description: 'Limit for paginated queries (sync-deal-states)'
    default: '500'
  runs:
    description: 'Number of evaluation runs (eval)'
    default: '10'
  batch-size:
    description: 'Threads per AI call (eval). 1 = one at a time, 5 = production batch size'
    default: '1'
  concurrency:
    description: 'Max parallel AI calls per run (eval). Default 50'
    default: '50'
  temperature:
    description: 'AI temperature (eval)'
    default: '0'
  prompt-hash:
    description: 'Git commit hash to fetch prompts from (eval). Empty = use bundled prompts'
  result-a:
    description: 'JSON result from eval variant A (eval-compare)'
  result-b:
    description: 'JSON result from eval variant B (eval-compare)'
  pipeline-max-concurrent:
    description: 'Max parallel batch workers (run-filter-pipeline, run-classify-pipeline)'
    default: '70'
  pipeline-filter-batch-size:
    description: 'Items per filter batch (run-filter-pipeline)'
    default: '200'
  pipeline-classify-batch-size:
    description: 'Threads per AI prompt (run-classify-pipeline)'
    default: '5'
  pipeline-claim-size:
    description: 'Threads per mega-claim (run-classify-pipeline). Higher = fewer SxT round-trips. Each mega-claim is split into sub-batches of classify-batch-size for AI.'
    default: '5'
  pipeline-max-retries:
    description: 'Max attempts per batch before dead letter (run-filter-pipeline, run-classify-pipeline)'
    default: '6'
  pipeline-flush-interval-ms:
    description: 'Write batcher flush interval in ms (run-classify-pipeline)'
    default: '5000'
  pipeline-flush-threshold:
    description: 'Write batcher flush threshold per queue (run-classify-pipeline)'
    default: '5'

outputs:
  success:
    description: 'Whether operation succeeded'
  result:
    description: 'JSON result of the operation'

runs:
  using: 'node24'
  main: 'dist/index.js'
