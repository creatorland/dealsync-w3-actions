name: 'Dealsync'
description: 'Dealsync pipeline action — dispatch, fetch-and-filter, fetch-and-classify, save-evals, save-deals, update-deal-states, retrigger-stuck, sxt-execute, sync-deal-states, dispatch-deal-state-sync'
author: 'creatorland'

inputs:
  command:
    description: 'Operation: dispatch, fetch-and-filter, fetch-and-classify, save-evals, save-deals, update-deal-states, retrigger-stuck, sxt-execute, sync-deal-states, dispatch-deal-state-sync'
    required: true
  auth-url:
    description: 'SxT auth proxy URL'
  auth-secret:
    description: 'SxT auth shared secret'
  api-url:
    description: 'SxT API base URL'
  biscuit:
    description: 'Pre-generated SxT biscuit'
  schema:
    description: 'SxT schema name'
  w3-rpc-url:
    description: 'W3 node URL for triggering processors (dispatch, retrigger-stuck, dispatch-deal-state-sync)'
  processor-name:
    description: 'Processor workflow name to trigger (dispatch, retrigger-stuck)'
    default: 'Dealsync Processor'
  max-filter:
    description: 'Max emails in filtering status at once (dispatch)'
    default: '30000'
  max-classify:
    description: 'Max emails in classifying status at once (dispatch)'
    default: '750'
  filter-batch-size:
    description: 'Emails per filter batch (dispatch)'
    default: '200'
  classify-batch-size:
    description: 'Emails per classify batch (dispatch)'
    default: '5'
  content-fetcher-url:
    description: 'Content fetcher service URL (fetch-and-filter, fetch-and-classify)'
  sql:
    description: 'SQL statement (sxt-execute)'
  sxt-command:
    description: 'SxT operation type: query or execute (sxt-execute)'
  batch-id:
    description: 'Batch ID for processor commands (fetch-and-filter, fetch-and-classify, save-evals, save-deals, update-deal-states)'
  hyperbolic-key:
    description: 'Hyperbolic API key for AI classification (fetch-and-classify)'
  primary-model:
    description: 'Primary AI model ID (fetch-and-classify)'
    default: 'deepseek-ai/DeepSeek-V3'
  fallback-model:
    description: 'Fallback AI model ID (fetch-and-classify)'
    default: 'Qwen/Qwen2.5-72B-Instruct'
  ai-api-url:
    description: 'AI API URL (fetch-and-classify)'
    default: 'https://api.hyperbolic.xyz/v1/chat/completions'
  sync-workflow-name:
    description: 'Deal state sync workflow name to trigger (dispatch-deal-state-sync)'
  deal-state-batch-size:
    description: 'Emails per deal state creation batch (dispatch-deal-state-sync)'
    default: '500'
  deal-state-max-emails:
    description: 'Max emails to process per cycle (dispatch-deal-state-sync)'
    default: '5000'
  offset:
    description: 'Offset for paginated queries (sync-deal-states)'
    default: '0'
  limit:
    description: 'Limit for paginated queries (sync-deal-states)'
    default: '500'

outputs:
  success:
    description: 'Whether operation succeeded'
  result:
    description: 'JSON result of the operation'

runs:
  using: 'node24'
  main: 'dist/index.js'
