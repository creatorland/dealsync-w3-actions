name: Filter Emails
description: Apply static filter rules to email content
inputs:
  emails:
    description: 'JSON array of EmailContent objects'
    required: true
outputs:
  success:
    description: 'Whether filtering succeeded'
  filtered_ids:
    description: 'SQL-quoted comma-separated IDs that passed (stage 3)'
  rejected_ids:
    description: 'SQL-quoted comma-separated IDs that failed (stage 106)'
runs:
  using: node24
  main: dist/index.js
